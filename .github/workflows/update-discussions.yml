name: Refresh Discussions

on:
  discussion:
    types:
      - created
      - edited

jobs:

  update-discussions:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate discussions.json
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node scripts/generate-discussions.js

      - name: Commit JSON
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/assets/discussions.json

          git diff --cached --quiet || git commit -m "update discussions"

          git push
