name: Update Issues JSON

on:
  issues:
    types:
      - opened
      - edited
      - closed
      - reopened
      - labeled
      - unlabeled

jobs:
  update-json:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate issues.json
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node scripts/generate-issues.js

      - name: Commit JSON
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/assets/issues.json

          git diff --cached --quiet || git commit -m "chore: update issues json"

          git push
