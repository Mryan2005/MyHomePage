<svg aria-hidden="true" width="0" height="0" style="position: absolute; overflow: hidden">
    <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="2" seed="92" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="2" result="blurred-noise" />
        <feDisplacementMap in="SourceGraphic" in2="blurred-noise" scale="72" xChannelSelector="R" yChannelSelector="G"
            result="displaced-1" />
        <feDisplacementMap in="displaced-1" in2="blurred-noise" scale="22" xChannelSelector="B" yChannelSelector="R" />
    </filter>
</svg>
<canvas #liquidWebglCanvas class="liquid-webgl-layer" aria-hidden="true"></canvas>
<app-topbar></app-topbar>
<main class="main">
    <router-outlet />
    <app-footbar *ngIf="!isTargetDomain"></app-footbar>
</main>
