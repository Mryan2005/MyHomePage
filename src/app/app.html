<svg aria-hidden="true" width="0" height="0" style="position: absolute">
    <filter id="glass-distortion" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="3" seed="12" result="noise" />
        <feGaussianBlur in="noise" stdDeviation="0.6" result="softNoise" />
        <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="55" xChannelSelector="R" yChannelSelector="G" />
    </filter>
</svg>

<main class="main">
    <router-outlet />
    <app-footbar *ngIf="!isTargetDomain"></app-footbar>
</main>
