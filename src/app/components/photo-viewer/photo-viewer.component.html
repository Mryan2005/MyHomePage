<div class="viewer">
    <button class="close-btn liquidGlass-wrapper" (click)="close()">
    <canvas class="liquidGlass-shader" aria-hidden="true"></canvas>
        <span class="liquidGlass-text">✕</span>
    </button>

    <div class="photo-frame liquidGlass-wrapper">
    <canvas class="liquidGlass-shader" aria-hidden="true"></canvas>
        <div class="liquidGlass-text photo-content">
            <img [src]="imageUrl" alt="" />
        </div>
    </div>
</div>
