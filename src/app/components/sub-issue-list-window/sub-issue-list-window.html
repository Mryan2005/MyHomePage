<div class="issue-window">

  <div *ngIf="loading" class="loading">
    Loading...
  </div>

  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <div
    *ngIf="!loading && !error && discussions.length === 0"
    class="empty"
  >
    No Status found
  </div>

  <div class="issue-list">

    @for (discussion of discussions; track discussion.url) {

      <div class="issue-row">
        <a href="{{ discussion.url }}">
            <div class="issue-title">
              {{ discussion.title }}
            </div>
        </a>
        <div class="status">

          <span
            class="badge"
            [class.working]="!discussion.closed"
            [class.pause]="discussion.closed && discussion.labels?.length"
            [class.done]="discussion.closed && !discussion.labels?.length"
          >

            {{ !discussion.closed ? 'Ongoing' : (discussion.labels?.length ? 'pause' : 'Done') }}

          </span>

        </div>

      </div>

    }

  </div>

</div>
