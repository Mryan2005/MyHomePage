<div class="issue-window">

  <div *ngIf="loading" class="loading">
    Loading...
  </div>

  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <div
    *ngIf="!loading && !error && issues.length === 0"
    class="empty"
  >
    No issues found
  </div>

  <div class="issue-list">

    <a
      *ngFor="let issue of issues"
      [href]="issue.html_url"
      target="_blank"
      class="issue-item"
    >

      <div class="issue-title">
        {{ issue.title }}
      </div>

      <div class="issue-state">
        {{ issue.state }}
      </div>

    </a>

  </div>

</div>
