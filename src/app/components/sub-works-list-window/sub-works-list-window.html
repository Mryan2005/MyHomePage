<div class="issue-window liquidGlass-wrapper">
    <div class="liquidGlass-effect"></div>
    <div class="liquidGlass-tint"></div>
    <div class="liquidGlass-shine"></div>
    <div class="liquidGlass-text issue-window-content">
        <div class="issue-list">
        @for (work of works; track work.url) {

            <div class="issue-row">
            <a href="{{ work.url }}">
                <div class="issue-title">
                    {{ work.title }}
                </div>
            </a>
            <div class="status">

                <span
                class="badge"
                [class.done]="work.public"
                [class.working]="!work.public"
                >

                {{ work.public ? 'Public Repo' : 'Private Repo' }}

                </span>

            </div>

            </div>

        }

        </div>
    </div>
</div>
